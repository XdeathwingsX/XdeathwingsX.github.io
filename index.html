<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Year With You</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tinderPink: "#FD267A",
            tinderOrange: "#FF6036",
            roseBlush: "#FFE8F1"
          },
          boxShadow: {
            glass: "0 20px 50px rgba(120, 20, 60, 0.25)",
            glow: "0 10px 30px rgba(253, 38, 122, 0.45)"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen min-h-dvh overflow-hidden text-rose-50 selection:bg-white/40 selection:text-white">
  <main id="app" class="relative min-h-screen min-h-dvh w-full">
    <section id="envelope-screen" class="relative h-screen h-dvh w-full">
      <button id="envelope-button" class="relative h-full w-full appearance-none border-0 bg-transparent p-0" aria-label="Open anniversary letter">
        <p class="envelope-top-text">FOR YOU, MY LOVE</p>

        <span class="envelope-letter" id="envelope-letter">
          <span class="text-sm font-medium text-rose-500">Happy Anniversary</span>
          <span class="mt-1 block text-lg font-semibold text-rose-600">Tap to open</span>
        </span>

        <span class="envelope-pocket"></span>
        <span class="envelope-flap" id="envelope-flap"></span>
        <span class="envelope-seal">❤</span>

        <p id="envelope-hint" class="envelope-bottom-text">Tap the envelope</p>
      </button>
    </section>

    <section id="game-screen" class="hidden w-full px-4 py-6 sm:px-6">
      <section
        id="question-card"
        aria-live="polite"
        class="glass-card card-enter mx-auto w-full max-w-xl rounded-[2rem] border border-white/40 bg-white/20 p-6 text-center shadow-glass backdrop-blur-2xl sm:p-8"
      >
        <p class="mx-auto mb-3 inline-flex items-center rounded-full border border-white/50 bg-white/20 px-3 py-1 text-xs font-semibold uppercase tracking-[0.15em] text-white/90">
          365 Days of Us
        </p>

        <h1 class="mx-auto max-w-md text-2xl font-semibold leading-tight text-white sm:text-4xl">
          Will you keep choosing me for year two and forever?
        </h1>

        <p class="mx-auto mt-3 max-w-sm text-sm text-roseBlush/90 sm:text-base">
          One year together. Still my favorite person, every single day.
        </p>

        <div id="buttons-wrap" class="relative mt-8 h-64 w-full overflow-hidden rounded-3xl border border-white/30 bg-white/10">
          <div class="absolute inset-0 bg-gradient-to-br from-white/20 to-transparent"></div>

          <button
            id="yes-btn"
            class="absolute left-1/2 top-[38%] z-20 min-h-[48px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-white px-6 py-3 text-base font-semibold text-tinderPink shadow-glow transition duration-300 ease-out hover:scale-105 active:scale-95"
          >
            Yes, always
          </button>

          <button
            id="no-btn"
            type="button"
            class="absolute left-1/2 top-[72%] z-30 min-h-[48px] -translate-x-1/2 -translate-y-1/2 rounded-full border border-white/70 bg-white/80 px-6 py-3 text-base font-semibold text-rose-600 transition duration-200 ease-out"
          >
            No
          </button>
        </div>

        <p id="hint" class="mt-4 text-sm text-roseBlush/95">Try pressing "No". It gets shy.</p>
      </section>

      <section
        id="celebrate-card"
        class="glass-card card-enter hidden mx-auto w-full max-w-xl rounded-[2rem] border border-white/40 bg-white/20 p-6 text-center shadow-glass backdrop-blur-2xl sm:p-8"
      >
        <p class="mx-auto mb-3 inline-flex items-center rounded-full border border-white/50 bg-white/20 px-3 py-1 text-xs font-semibold uppercase tracking-[0.15em] text-white/90">
          Best Answer Ever
        </p>
        <h2 class="text-3xl font-semibold leading-tight text-white sm:text-4xl">I love you beyond words.</h2>
        <p class="mx-auto mt-3 max-w-sm text-sm text-roseBlush/95 sm:text-base">Thank you for giving me the best year of my life. Here is to all our nexts.</p>
        <p class="mt-5 text-3xl" aria-hidden="true">❤️ 💖 💞 💘 💝</p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
